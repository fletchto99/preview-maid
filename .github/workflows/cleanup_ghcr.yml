name: Cleanup GHCR

on:
  schedule:
    - cron: "0 6 * * 1" # Weekly on Monday at 6:00 UTC
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Cleanup old images
        uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          delete-orphaned-images: true
          keep-n-tagged: 10
          token: ${{ secrets.GITHUB_TOKEN }}
